<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Bottom — Siege Defense</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://sw-rockbottom.com/images/logo.png">
  <link rel="apple-touch-icon" href="https://sw-rockbottom.com/images/logo.png">

  <!-- Open Graph / Discord embed -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://sw-rockbottom.com/">
  <meta property="og:title"       content="Rock Bottom — Siege Defense">
  <meta property="og:description" content="Season 21 siege defense compositions and tower placements for Rock Bottom guild members.">
  <meta property="og:image"       content="https://sw-rockbottom.com/images/logo.png">
  <meta name="theme-color"        content="#f59e0b">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--gold); }

    :root {
      --bg:           #070b14;
      --surface:      #0f1623;
      --surface2:     #161e2e;
      --border:       #1e2d45;
      --text:         #c8d6e8;
      --muted:        #637389;
      --white:        #f0f6ff;
      --gold:         #f59e0b;
      --gold-bg:      rgba(245,158,11,0.12);
      --gold-border:  rgba(245,158,11,0.35);
      --purple:       #a855f7;
      --purple-bg:    rgba(168,85,247,0.12);
      --purple-border:rgba(168,85,247,0.35);
      --cyan:         #22d3ee;
      --cyan-bg:      rgba(34,211,238,0.12);
      --cyan-border:  rgba(34,211,238,0.35);
      --orange:       #fb923c;
      --orange-bg:    rgba(251,146,60,0.12);
      --orange-border:rgba(251,146,60,0.35);
      --slate:        #94a3b8;
      --slate-bg:     rgba(100,116,139,0.12);
      --slate-border: rgba(100,116,139,0.35);
    }

    html { scroll-behavior: smooth; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }

    /* ─── NAV ─── */
    nav {
      position:sticky; top:0; z-index:200;
      background:rgba(7,11,20,0.92); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      padding:0 2rem; height:58px;
      display:flex; align-items:center; gap:1rem;
    }
    .nav-brand {
      display:flex; align-items:center; gap:9px;
      font-family:'Rajdhani',sans-serif; font-size:1.3rem; font-weight:700; letter-spacing:0.06em;
      color:var(--white); text-decoration:none; white-space:nowrap; margin-right:auto;
    }
    .nav-swgt {
      display:flex; align-items:center; gap:6px;
      font-size:0.8rem; font-weight:700; letter-spacing:0.04em;
      background:var(--gold); color:#000;
      padding:6px 14px; border-radius:8px; text-decoration:none; white-space:nowrap;
      transition:opacity 0.18s, transform 0.18s;
    }
    .nav-swgt:hover { opacity:0.88; transform:translateY(-1px); }
    .nav-swgt svg { flex-shrink:0; }
    .nav-discord {
      display:flex; align-items:center; gap:6px;
      font-size:0.8rem; font-weight:700; letter-spacing:0.04em;
      background:#5865f2; color:#fff;
      padding:6px 14px; border-radius:8px; text-decoration:none; white-space:nowrap;
      transition:opacity 0.18s, transform 0.18s;
    }
    .nav-discord:hover { opacity:0.88; transform:translateY(-1px); }
    .nav-discord svg { flex-shrink:0; }

    /* nav search */
    .nav-search { position:relative; display:flex; align-items:center; }
    .nav-search input {
      background:var(--surface2); border:1px solid var(--border); border-radius:8px;
      color:var(--white); font-size:0.82rem; padding:5px 30px 5px 11px;
      width:180px; outline:none; transition:border-color 0.18s, width 0.3s;
    }
    .nav-search input::placeholder { color:var(--muted); }
    .nav-search input:focus { border-color:var(--gold-border); width:220px; }
    .nav-search-clear {
      position:absolute; right:8px;
      background:none; border:none; cursor:pointer;
      color:var(--muted); font-size:0.85rem; line-height:1;
      display:none; align-items:center; justify-content:center;
      padding:2px;
    }
    .nav-search-clear:hover { color:var(--white); }

    /* ─── HERO ─── */
    .hero {
      padding:4rem 2rem 3rem; text-align:center;
      background:
        radial-gradient(ellipse 70% 60% at 50% 0%, rgba(245,158,11,0.1) 0%, transparent 70%),
        radial-gradient(ellipse 55% 65% at 50% 45%, rgba(7,11,20,0.72) 0%, transparent 100%),
        linear-gradient(to bottom, rgba(7,11,20,0.68) 0%, rgba(7,11,20,0.62) 35%, rgba(7,11,20,0.95) 100%),
        url('https://sw-rockbottom.com/images/Banner.png') center 30% / cover no-repeat;
      border-bottom:1px solid var(--border);
      position:relative; overflow:hidden;
    }
    .hero-eyebrow {
      font-size:0.65rem; font-weight:600; letter-spacing:0.28em; text-transform:uppercase;
      color:rgba(200,214,232,0.9); margin-bottom:0.35rem; position:relative;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
      animation:fadeDown 0.5s ease both;
    }
    .hero-desc {
      font-family:'Space Grotesk',sans-serif; font-size:0.875rem; font-weight:400;
      color:rgba(200,214,232,0.92); line-height:1.65; letter-spacing:0.01em;
      max-width:440px; margin:0 auto 1.25rem; position:relative;
      text-shadow: 0 1px 6px rgba(0,0,0,0.7);
      animation:fadeDown 0.5s 0.18s ease both;
    }
    .hero-season-pill {
      font-family:'Rajdhani',sans-serif; font-size:1.05rem; font-weight:700;
      letter-spacing:0.14em; text-transform:uppercase;
      background:var(--gold-bg); border:1px solid var(--gold-border); color:var(--gold);
      padding:5px 18px; border-radius:20px;
      animation:pill-pulse 3.5s ease-in-out infinite;
      cursor:pointer; user-select:none;
      transition:background 0.18s, border-color 0.18s, transform 0.15s;
    }
    .hero-season-pill:hover {
      background:rgba(245,158,11,0.22); border-color:rgba(245,158,11,0.6);
      transform:translateY(-1px);
    }
    .hero-season-pill:active { transform:translateY(0); }
    @keyframes season-flash {
      0%   { background:rgba(245,158,11,0.5); border-color:var(--gold); }
      100% { background:var(--gold-bg);       border-color:var(--gold-border); }
    }
    .hero-season-pill.season-flash { animation:season-flash 0.45s ease forwards, pill-pulse 3.5s 0.45s ease-in-out infinite; }
    @keyframes pill-pulse {
      0%,100% { box-shadow:0 0 0 0 rgba(245,158,11,0); }
      50%      { box-shadow:0 0 14px 3px rgba(245,158,11,0.18); }
    }
    .hero::before {
      content:''; position:absolute; inset:0;
      background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23f59e0b' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity:0.5;
    }
    .hero h1 {
      font-family:'Rajdhani',sans-serif;
      font-size:clamp(2.2rem,5.5vw,4rem); font-weight:700; letter-spacing:0.04em;
      color:var(--white); line-height:1.05; margin-bottom:0.75rem; position:relative;
      text-shadow: 0 2px 20px rgba(0,0,0,0.9), 0 0 40px rgba(0,0,0,0.5);
      animation:fadeDown 0.5s 0.07s ease both;
    }
    .hero h1 span { color:var(--gold); animation:gold-shimmer 4s ease-in-out infinite; }
    @keyframes gold-shimmer {
      0%,100% { opacity:1; }
      50%      { opacity:0.75; }
    }
    .hero-meta {
      display:flex; align-items:center; justify-content:center; gap:8px;
      position:relative; animation:fadeDown 0.5s 0.24s ease both;
    }
    .last-updated {
      font-size:0.72rem; color:var(--muted);
      background:var(--surface2); border:1px solid var(--border);
      padding:3px 10px; border-radius:20px;
    }


    /* ─── MAIN ─── */
    main { max-width:1200px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }

    /* ── SECTION ── */
    .defense-section { margin-bottom:2.5rem; }

    .section-header {
      display:flex; align-items:center; gap:12px;
      margin-bottom:1.1rem; padding-bottom:0.9rem; border-bottom:1px solid var(--border);
      cursor:pointer; user-select:none;
    }
    .section-header:hover .section-title { color:var(--white); }
    .section-badge {
      display:inline-flex; align-items:center; gap:5px;
      font-size:0.7rem; font-weight:700; letter-spacing:0.1em;
      text-transform:uppercase; padding:4px 12px; border-radius:20px; white-space:nowrap;
    }
    .badge-nat5    { background:var(--gold-bg);    border:1px solid var(--gold-border);    color:var(--gold); }
    .badge-special { background:var(--purple-bg);  border:1px solid var(--purple-border);  color:var(--purple); }
    .badge-nat4    { background:var(--cyan-bg);    border:1px solid var(--cyan-border);    color:var(--cyan); }
    .badge-hq      { background:var(--orange-bg);  border:1px solid var(--orange-border);  color:var(--orange); }
    .badge-map     { background:var(--slate-bg);   border:1px solid var(--slate-border);   color:var(--slate); }
    .section-title { font-size:1.05rem; font-weight:700; color:var(--text); transition:color 0.18s; }
    .section-count-pill {
      font-size:0.7rem; font-weight:700;
      background:var(--surface2); border:1px solid var(--border); color:var(--muted);
      padding:2px 8px; border-radius:20px;
    }
    .collapse-icon {
      margin-left:auto; color:var(--muted); font-size:0.85rem;
      transition:transform 0.25s ease; display:inline-block;
    }
    .defense-section.collapsed .collapse-icon { transform:rotate(-90deg); }

    /* ─── TEAMS GRID ─── */
    .teams-grid {
      display:flex; flex-direction:column; gap:8px;
      overflow:visible; transition:height 0.3s ease;
    }

    /* ─── TEAM ROW ─── */
    .team-row {
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      padding:11px 16px; display:flex; align-items:center; flex-wrap:wrap; gap:8px;
      transition:border-color 0.2s, background 0.2s, opacity 0.25s, transform 0.2s, box-shadow 0.2s;
      overflow:visible; position:relative; z-index:0;
      animation:fadeUp 0.35s ease both;
    }
    .team-row:hover { z-index:10; }
    .section-nat5    .team-row:hover { border-color:var(--gold-border);    background:rgba(245,158,11,0.07); }
    .section-special .team-row:hover { border-color:var(--purple-border);  background:rgba(168,85,247,0.07); }
    .section-nat4    .team-row:hover { border-color:var(--cyan-border);    background:rgba(34,211,238,0.07); }
    .section-hq      .team-row:hover { border-color:var(--orange-border);  background:rgba(251,146,60,0.07); }

    .team-index { font-size:0.7rem; font-weight:600; color:var(--muted); min-width:18px; margin-right:4px; align-self:center; }
    .team-sep { width:1px; height:62px; background:var(--border); margin:0 13px; flex-shrink:0; }
    .team-tower {
      margin-left:auto; align-self:center; flex-shrink:0;
      display:flex; flex-direction:column; align-items:center; gap:3px;
    }
    .team-tower-label { font-size:0.58rem; font-weight:700; letter-spacing:0.1em; color:var(--muted); text-transform:uppercase; }
    .team-tower-nums { display:flex; flex-wrap:wrap; gap:4px; justify-content:center; width:76px; }
    .team-tower-num {
      font-family:'Rajdhani',sans-serif; font-size:1.05rem; font-weight:700; line-height:1;
      background:var(--surface2); border:1px solid var(--border); color:var(--muted);
      width:35px; height:35px; border-radius:7px;
      display:flex; align-items:center; justify-content:center;
    }

    /* ─── MONSTER ─── */
    .monster { display:flex; flex-direction:column; align-items:center; gap:4px; width:62px; flex-shrink:0; }
    .slot-tag { font-size:0.6rem; font-weight:700; letter-spacing:0.1em; color:var(--muted); text-transform:uppercase; height:13px; line-height:13px; }
    .slot-tag.lead { color:var(--gold); }
    .monster-img {
      width:58px; height:58px; border-radius:8px;
      background:var(--surface2); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center; overflow:hidden;
      transition:box-shadow 0.2s;
    }
    .monster-img img { width:100%; height:100%; object-fit:contain; }
    .monster-name { font-size:0.65rem; font-weight:500; color:var(--muted); text-align:center; max-width:62px; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color 0.2s; }

    /* search highlight */
    .monster.match .monster-img { box-shadow:0 0 0 2px var(--gold); }
    .monster.match .monster-name { color:var(--gold); }
    .slot-deck.match .deck-primary { box-shadow:0 0 0 2px var(--gold) !important; }
    .slot-deck.match .monster-name { color:var(--gold); }

    /* dim non-matching rows */
    .team-row.dimmed { opacity:0.25; }

    /* ─── SLOT DECK ─── */
    .slot-deck {
      position:relative; width:62px; flex-shrink:0;
      display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;
    }
    .deck-shadow { position:absolute; top:12px; left:2px; width:58px; height:58px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); }
    .deck-shadow.s1 { transform:translateY(3px) rotate(7deg);  opacity:0.55; }
    .deck-shadow.s2 { transform:translateY(5px) rotate(-5deg); opacity:0.35; }
    .deck-primary {
      position:relative; z-index:1; width:58px; height:58px; border-radius:8px;
      background:var(--surface2); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center; overflow:hidden;
      transition:box-shadow 0.2s;
    }
    .deck-primary img { width:100%; height:100%; object-fit:contain; }
    .slot-deck:hover .deck-primary { box-shadow:0 0 0 2px var(--gold); }
    .deck-badge {
      position:absolute; top:10px; right:-5px; z-index:2;
      background:var(--gold); color:#000; font-size:0.5rem; font-weight:800;
      padding:2px 5px; border-radius:10px; line-height:1; pointer-events:none;
    }

    /* popover */
    .deck-popover {
      position:absolute; top:calc(100% + 10px); left:50%;
      transform:translateX(-50%) translateY(-6px);
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      padding:12px 14px; opacity:0; pointer-events:none;
      transition:opacity 0.18s ease, transform 0.18s ease;
      z-index:300; min-width:max-content;
      box-shadow:0 12px 32px rgba(0,0,0,0.5);
    }
    .deck-popover::before {
      content:''; position:absolute; top:-5px; left:50%;
      transform:translateX(-50%) rotate(45deg); width:8px; height:8px;
      background:var(--surface); border-left:1px solid var(--border); border-top:1px solid var(--border);
    }
    .slot-deck:hover .deck-popover { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }

    /* flip upward when near viewport bottom */
    .deck-popover.open-up { top:auto; bottom:calc(100% + 10px); transform:translateX(-50%) translateY(6px); }
    .slot-deck:hover .deck-popover.open-up { transform:translateX(-50%) translateY(0); }
    .deck-popover.open-up::before { top:auto; bottom:-5px; border-left:none; border-top:none; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }

    .popover-label { font-size:0.6rem; font-weight:700; letter-spacing:0.12em; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
    .popover-monsters { display:flex; gap:8px; align-items:flex-start; }
    .popover-monsters .monster { width:54px; }
    .popover-monsters .monster-img { width:50px; height:50px; }
    .popover-monsters .monster-name { max-width:54px; font-size:0.6rem; }

    /* ─── NO RESULTS ─── */
    .no-results {
      padding:1.75rem; text-align:center; color:var(--muted); font-size:0.9rem;
      border:1px dashed var(--border); border-radius:10px; display:none;
    }

    /* ─── PLACEMENTS ─── */
    .placements-section { margin-bottom:3rem; }
    .map-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; display:flex; justify-content:center; }
    .map-card img { max-width:100%; border-radius:8px; display:block; }

    /* ─── FOOTER ─── */
    footer { border-top:1px solid var(--border); padding:1.5rem 2rem; text-align:center; color:var(--muted); font-size:0.78rem; display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; }
    .footer-sep { opacity:0.4; }
    footer a { color:var(--gold); text-decoration:none; }
    footer a:hover { text-decoration:underline; }

    /* ─── HERO ATMOSPHERE ─── */
    .hero::after {
      content:''; position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(ellipse 55% 70% at 15% 60%, rgba(245,158,11,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 55% 70% at 85% 60%, rgba(168,85,247,0.04) 0%, transparent 70%);
      animation:hero-drift 10s ease-in-out infinite alternate;
    }
    @keyframes hero-drift {
      0%   { opacity:0.4; transform:translateX(-15px); }
      100% { opacity:1;   transform:translateX(15px); }
    }



    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-8px);  } to { opacity:1; transform:translateY(0); } }

    /* ─── BACK TO TOP ─── */
    .back-to-top {
      position:fixed; bottom:1.5rem; right:1.5rem; z-index:500;
      width:40px; height:40px;
      background:var(--surface2); border:1px solid var(--border); border-radius:10px;
      color:var(--muted); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none;
      transition:opacity 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
    }
    .back-to-top.visible { opacity:1; pointer-events:auto; }
    .back-to-top:hover { border-color:var(--gold-border); color:var(--gold); transform:translateY(-2px); }

    /* ─── SECTION CONTROLS ─── */
    .section-controls-bar {
      display:flex; justify-content:flex-end; margin-bottom:1.25rem;
    }
    .btn-toggle-all {
      font-size:0.72rem; font-weight:600; letter-spacing:0.06em;
      background:var(--surface2); border:1px solid var(--border); color:var(--muted);
      padding:5px 14px; border-radius:8px; cursor:pointer;
      transition:border-color 0.18s, color 0.18s;
    }
    .btn-toggle-all:hover { border-color:var(--gold-border); color:var(--gold); }

    /* ─── COPY LINK ─── */
    .copy-link-btn {
      background:none; border:none; cursor:pointer; line-height:1;
      color:var(--muted); padding:2px 4px; border-radius:4px;
      display:inline-flex; align-items:center;
      opacity:0; transition:opacity 0.15s, color 0.15s; pointer-events:none;
    }
    .section-header:hover .copy-link-btn { opacity:1; pointer-events:auto; }
    .copy-link-btn:hover, .copy-link-btn.copied { color:var(--gold); }

    /* ─── RESPONSIVE ─── */
    @media (max-width:640px) {
      nav { padding:0 1rem; gap:0.5rem; height:54px; }
      .nav-search input { width:110px; }
      .nav-search input:focus { width:145px; }
      .hero { padding:2.5rem 1rem 2rem; }
      .hero h1 { font-size:clamp(1.9rem,8vw,3rem); }
      main { padding:1.75rem 1rem 3rem; }
      .team-row { padding:10px 12px; gap:7px; }
      .team-sep { margin:0 10px; height:58px; }
      .defense-section { margin-bottom:2rem; }
    }
    @media (max-width:520px) {
      .nav-btn-label { display:none; }
      .nav-discord, .nav-swgt { padding:6px 10px; }
    }
    @media (max-width:440px) {
      .monster, .slot-deck { width:52px; }
      .monster-img, .deck-primary { width:48px; height:48px; }
      .deck-shadow { width:48px; height:48px; }
      .monster-name { max-width:52px; font-size:0.58rem; }
      .team-sep { margin:0 7px; height:52px; }
      .team-tower-nums { width:70px; }
      .team-tower-num { width:32px; height:32px; font-size:0.95rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-brand" href="#">
    <img src="https://sw-rockbottom.com/images/logo.png" alt="Rock Bottom" style="width:30px;height:30px;object-fit:contain;">
    ROCK BOTTOM
  </a>

let activeSeason = DATA.currentSeason;

/* ═══════════════════════════════════════════
   SEASON CYCLING
═══════════════════════════════════════════ */
function cycleSeason() {
  const keys = Object.keys(DATA.seasons).map(Number).sort((a, b) => b - a);
  const idx = keys.indexOf(activeSeason);
  activeSeason = keys[(idx + 1) % keys.length];
  renderPage();

  // brief flash animation on pill
  const pill = document.querySelector('.hero-season-pill');
  pill.classList.remove('season-flash');
  void pill.offsetWidth; // reflow
  pill.classList.add('season-flash');
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function img(path) { return `${BASE}${path}.png`; }

function renderSlot(mon, label, isLead) {
  const tagClass = isLead ? 'slot-tag lead' : 'slot-tag';
  const tagText  = isLead ? 'LEAD' : label;
  const hasAlts  = mon.alts && mon.alts.length > 0;
  const allNames = [mon.n, ...(mon.alts||[]).map(a=>a.n)].join(',');

  if (hasAlts) {
    const altsHTML = mon.alts.map(a => `
      <div class="monster">
        <div class="monster-img"><img src="${img(a.p)}" alt="${a.n}" loading="lazy"></div>
        <span class="monster-name">${a.n}</span>
      </div>`).join('');
    return `
      <div class="slot-deck" tabindex="0" data-names="${allNames.toLowerCase()}">
        <span class="${tagClass}">${tagText}</span>
        <div class="deck-shadow s1"></div><div class="deck-shadow s2"></div>
        <div class="deck-primary"><img src="${img(mon.p)}" alt="${mon.n}" loading="lazy"></div>
        <span class="monster-name">${mon.n}</span>
        <span class="deck-badge">+${mon.alts.length}</span>
        <div class="deck-popover">
          <div class="popover-label">${label} alternatives</div>
          <div class="popover-monsters">${altsHTML}</div>
        </div>
      </div>`;
  }
  return `
    <div class="monster" data-names="${mon.n.toLowerCase()}">
      <span class="${tagClass}">${tagText}</span>
      <div class="monster-img"><img src="${img(mon.p)}" alt="${mon.n}" loading="lazy"></div>
      <span class="monster-name">${mon.n}</span>
    </div>`;
}

function renderTeam(team, idx) {
  const allNames = ['lead','m2','m3']
    .flatMap(k => team[k] ? [team[k].n, ...(team[k].alts||[]).map(a=>a.n)] : [])
    .join(',').toLowerCase();

  const slots = [
    team.lead ? renderSlot(team.lead, 'LEAD', true) : '',
    team.m2   ? renderSlot(team.m2,   'M2',   false) : '',
    team.m3   ? renderSlot(team.m3,   'M3',   false) : '',
  ].join('');

  const towerHTML = team.tower != null ? (() => {
    const towers = Array.isArray(team.tower) ? team.tower : [team.tower];
    const numsHTML = towers.map(t => `<span class="team-tower-num">${t}</span>`).join('');
    return `
    <div class="team-tower">
      <span class="team-tower-label">Tower${towers.length > 1 ? 's' : ''}</span>
      <div class="team-tower-nums">${numsHTML}</div>
    </div>`;
  })() : '';

  const delay = (idx * 0.04).toFixed(2);
  return `
    <div class="team-row" data-monsters="${allNames}" style="animation-delay:${delay}s">
      <span class="team-index">${String(idx+1).padStart(2,'0')}</span>
      <div class="team-sep"></div>
      ${slots}
      ${towerHTML}
    </div>`;
}

function renderSection(section) {
  const teamsHTML = section.teams.map((t,i) => renderTeam(t,i)).join('');
  return `
    <div class="defense-section section-${section.id}" id="section-${section.id}">
      <div class="section-header" onclick="toggleSection(this)">
        <span class="section-badge ${section.badgeClass}">${section.badgeText}</span>
        <span class="section-title">${section.title}</span>
        <span class="section-count-pill">${section.teams.length}</span>
        <button class="copy-link-btn" onclick="copyLink(event,'${section.id}')" title="Copy link">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
        <span class="collapse-icon">▾</span>
      </div>
      <div class="teams-grid">
        ${teamsHTML}
        <div class="no-results">No teams match your search.</div>
      </div>
    </div>`;
}

function renderPage() {
  const season = DATA.seasons[activeSeason];

  // Defense sections
  document.getElementById('defenses').innerHTML =
    `<div id="defenses-anchor"></div>` + season.sections.map(renderSection).join('');

  // Placement image
  document.getElementById('placement-img').src = `${BASE}${season.placementImg}`;
  document.getElementById('placement-img').alt = 'Tower Placement Map';

  // Last updated
  document.getElementById('last-updated').textContent = `Updated ${season.lastUpdated}`;

  // Season pill text
  const pill = document.querySelector('.hero-season-pill');
  if (pill) pill.textContent = `Season ${activeSeason}`;

  // Re-init interactions
  initPopovers();
}

/* ═══════════════════════════════════════════
   COLLAPSE
═══════════════════════════════════════════ */
function toggleSection(header) {
  const section = header.parentElement;
  const grid = section.querySelector('.teams-grid');

  if (section.classList.contains('collapsed')) {
    section.classList.remove('collapsed');
    grid.style.overflow = 'hidden';
    grid.style.height = grid.scrollHeight + 'px';
    grid.addEventListener('transitionend', () => {
      grid.style.height = 'auto';
      grid.style.overflow = 'visible';
    }, { once: true });
  } else {
    grid.style.height = grid.scrollHeight + 'px';
    grid.style.overflow = 'hidden';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      grid.style.height = '0px';
      section.classList.add('collapsed');
    }));
  }
}

/* ═══════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════ */
function filterTeams() {
  const term = document.getElementById('search-input').value.trim().toLowerCase();

  document.querySelectorAll('.defense-section').forEach(section => {
    const rows = section.querySelectorAll('.team-row');
    const noResults = section.querySelector('.no-results');
    let visible = 0;

    rows.forEach(row => {
      const names = row.dataset.monsters || '';
      const match = !term || names.includes(term);
      row.style.display = match ? '' : 'none';
      row.classList.toggle('dimmed', false);
      if (match) visible++;

      // highlight matching slots
      row.querySelectorAll('.monster[data-names], .slot-deck[data-names]').forEach(el => {
        const elNames = el.dataset.names || '';
        el.classList.toggle('match', !!term && elNames.split(',').some(n => n.includes(term)));
      });
    });

    // expand section if it has matches
    if (term && visible > 0 && section.classList.contains('collapsed')) {
      toggleSection(section.querySelector('.section-header'));
    }

    noResults.style.display = term && visible === 0 ? 'block' : 'none';
  });
}

function initSearch() {
  const input = document.getElementById('search-input');
  const clear = document.getElementById('search-clear');
  input.addEventListener('input', () => {
    clear.style.display = input.value ? 'flex' : 'none';
    filterTeams();
  });
  clear.addEventListener('click', () => {
    input.value = '';
    clear.style.display = 'none';
    filterTeams();
  });
}

/* ═══════════════════════════════════════════
   POPOVER FLIP (up when near bottom)
═══════════════════════════════════════════ */
function initPopovers() {
  document.querySelectorAll('.slot-deck').forEach(deck => {
    deck.addEventListener('mouseenter', () => {
      const pop = deck.querySelector('.deck-popover');
      if (!pop) return;
      const rect = deck.getBoundingClientRect();
      pop.classList.toggle('open-up', rect.bottom + 130 > window.innerHeight);
    });
  });
}


/* ═══════════════════════════════════════════
   TOGGLE ALL
═══════════════════════════════════════════ */
function toggleAll() {
  const btn = document.getElementById('btn-toggle-all');
  const sections = document.querySelectorAll('.defense-section');
  const anyExpanded = [...sections].some(s => !s.classList.contains('collapsed'));
  sections.forEach(s => {
    const header = s.querySelector('.section-header');
    const isCollapsed = s.classList.contains('collapsed');
    if (anyExpanded && !isCollapsed) toggleSection(header);
    if (!anyExpanded && isCollapsed) toggleSection(header);
  });
  btn.textContent = anyExpanded ? 'Expand All' : 'Collapse All';
}

/* ═══════════════════════════════════════════
   COPY LINK
═══════════════════════════════════════════ */
function copyLink(e, id) {
  e.stopPropagation();
  const url = `${location.href.split('#')[0]}#section-${id}`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = e.currentTarget;
    btn.classList.add('copied');
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';
    }, 1500);
  });
}

/* ═══════════════════════════════════════════
   BACK TO TOP
═══════════════════════════════════════════ */
const backToTopBtn = document.getElementById('back-to-top');
window.addEventListener('scroll', () => {
  backToTopBtn.classList.toggle('visible', window.scrollY > 300);
});
backToTopBtn.addEventListener('click', () => window.scrollTo({ top:0, behavior:'smooth' }));

/* ═══════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
});

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
renderPage();
initSearch();
