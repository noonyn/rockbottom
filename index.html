<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Bottom — Coming Soon</title>

  <link rel="icon" type="image/png" href="https://sw-rockbottom.com/images/logo.png">
  <link rel="apple-touch-icon" href="https://sw-rockbottom.com/images/logo.png">

  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://sw-rockbottom.com/">
  <meta property="og:title"       content="Rock Bottom — Siege Defense">
  <meta property="og:description" content="We're working on something new. Back soon.">
  <meta property="og:image"       content="https://sw-rockbottom.com/images/logo.png">
  <meta name="theme-color"        content="#f59e0b">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    :root {
      --bg:          #070b14;
      --surface:     #0f1623;
      --surface2:    #161e2e;
      --border:      #1e2d45;
      --text:        #c8d6e8;
      --muted:       #637389;
      --white:       #f0f6ff;
      --gold:        #f59e0b;
      --gold-bg:     rgba(245,158,11,0.12);
      --gold-border: rgba(245,158,11,0.35);
    }

    html, body {
      height:100%;
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg); color:var(--text);
    }

    body {
      min-height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center;
      background:
        radial-gradient(ellipse 70% 55% at 50% 0%, rgba(245,158,11,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 55% 65% at 50% 45%, rgba(7,11,20,0.72) 0%, transparent 100%),
        linear-gradient(to bottom, rgba(7,11,20,0.72) 0%, rgba(7,11,20,0.65) 35%, rgba(7,11,20,0.97) 100%),
        url('https://sw-rockbottom.com/images/Banner.png') center 30% / cover no-repeat;
      padding:2rem;
      position:relative; overflow:hidden;
    }

    /* subtle dot pattern */
    body::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23f59e0b' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity:0.5;
    }

    .card {
      position:relative; z-index:1;
      background:rgba(15,22,35,0.82);
      border:1px solid var(--border);
      border-radius:16px;
      padding:3rem 2.5rem;
      max-width:480px; width:100%;
      backdrop-filter:blur(12px);
      animation:fadeUp 0.5s ease both;
    }

    .logo {
      width:56px; height:56px; object-fit:contain;
      margin:0 auto 1.25rem;
      display:block;
      filter:drop-shadow(0 0 12px rgba(245,158,11,0.3));
    }

    .eyebrow {
      font-size:0.62rem; font-weight:600; letter-spacing:0.28em; text-transform:uppercase;
      color:var(--muted); margin-bottom:0.5rem;
      animation:fadeUp 0.5s 0.08s ease both;
    }

    h1 {
      font-family:'Rajdhani',sans-serif;
      font-size:clamp(2rem,6vw,3rem); font-weight:700; letter-spacing:0.04em;
      color:var(--white); line-height:1.05; margin-bottom:1rem;
      text-shadow:0 2px 20px rgba(0,0,0,0.9);
      animation:fadeUp 0.5s 0.14s ease both;
    }
    h1 span { color:var(--gold); }

    p {
      font-size:0.88rem; font-weight:400; color:var(--text);
      line-height:1.65; max-width:340px; margin:0 auto 1.75rem;
      animation:fadeUp 0.5s 0.2s ease both;
    }

    .divider {
      width:40px; height:2px;
      background:linear-gradient(90deg, transparent, var(--gold), transparent);
      margin:0 auto 1.75rem;
      animation:fadeUp 0.5s 0.26s ease both;
    }

    .links {
      display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap;
      animation:fadeUp 0.5s 0.3s ease both;
    }

    .btn {
      display:inline-flex; align-items:center; gap:7px;
      font-size:0.8rem; font-weight:700; letter-spacing:0.04em;
      padding:8px 18px; border-radius:8px; text-decoration:none;
      transition:opacity 0.18s, transform 0.18s;
    }
    .btn:hover { opacity:0.88; transform:translateY(-1px); }
    .btn-discord { background:#5865f2; color:#fff; }
    .btn-swgt    { background:var(--gold); color:#000; }

    .badge {
      display:inline-flex; margin-top:1.75rem;
      font-family:'Rajdhani',sans-serif; font-size:0.95rem; font-weight:700;
      letter-spacing:0.14em; text-transform:uppercase;
      background:var(--gold-bg); border:1px solid var(--gold-border); color:var(--gold);
      padding:4px 16px; border-radius:20px;
      animation:pill-pulse 3.5s ease-in-out infinite, fadeUp 0.5s 0.36s ease both;
    }

    @keyframes pill-pulse {
      0%,100% { box-shadow:0 0 0 0 rgba(245,158,11,0); }
      50%      { box-shadow:0 0 14px 3px rgba(245,158,11,0.18); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="https://sw-rockbottom.com/images/logo.png" alt="Rock Bottom">
    <div class="eyebrow">Summoners War · Sky Arena</div>
    <h1>ROCK <span>BOTTOM</span></h1>
    <div class="divider"></div>
    <p>Under maintenance, check back soon.</p>
    <div class="links">
      <a class="btn btn-discord" href="https://tinyurl.com/swrockbottom" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.032.055a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Discord
      </a>
      <a class="btn btn-swgt" href="https://rockbottom.swgt.io/" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        SWGT
      </a>
    </div>
  </div>
</body>
</html>
